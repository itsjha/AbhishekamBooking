<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Booking Calendar</title>

  <link rel="stylesheet" href="style.css">
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.20/index.global.min.css" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.20/index.global.min.js"></script>
  <script defer src="script.js"></script>
</head>

<body>
  <h1>Event Booking Calendar</h1>

  <div class="login-box">
    <input type="text" id="name" placeholder="Your Name">
    <input type="text" id="flatNo" placeholder="Flat No.">
    <input type="email" id="email" placeholder="Your Email">
    <button onclick="login()">Send Login Link</button>
  </div>

  <div id="message"></div>
  <div id="calendar"></div>
</body>
</html>
